[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python main.py"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.envVars]]
name = "PYTHONUNBUFFERED"
value = "1"

[[deploy.envVars]]
name = "DB_PATH"
value = "/app/data/vfs_bot.db"
